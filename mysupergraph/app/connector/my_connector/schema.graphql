schema {
  query: Query
  mutation: Mutation
}

type Query {
  orders: [Order!]!
  order(id: ID!): OrderPayload!
  ordersByUser(user_id: ID!): OrdersPayload!
}

"""
  The `ID` scalar type represents a unique identifier, often used to
  refetch an object or as key for a cache. The ID type appears in a JSON
  response as a String; however, it is not intended to be human-readable.
  When expected as an input type, any string (such as `"4"`) or integer
  (such as `4`) input value will be accepted as an ID.
"""
scalar ID

"""
  The `Float` scalar type represents signed double-precision fractional
  values as specified by
  [IEEE 754](http://en.wikipedia.org/wiki/IEEE_floating_point). 
"""
scalar Float

"""
  The `String` scalar type represents textual data, represented as UTF-8
  character sequences. The String type is most often used by GraphQL to
  represent free-form human-readable text.
"""
scalar String

"""
  The `Int` scalar type represents non-fractional signed whole numeric
  values. Int can represent values between -(2^31) and 2^31 - 1. 
"""
scalar Int

type Mutation {
  createOrder(input: CreateOrderInput!): OrderPayload!
  updateOrderStatus(id: ID!, status: OrderStatus!): OrderPayload!
  updateOrderItemQuantity(order_id: ID!, item_id: ID!, quantity: Int!): OrderPayload!
  deleteOrder(id: ID!): OrderPayload!
}

"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime

enum OrderStatus {
  pending
  confirmed
  cancelled
}

input CreateOrderInput {
  user_id: ID!
  notes: String
  items: [CreateOrderItemInput!]!
}

input CreateOrderItemInput {
  product_id: ID!
  quantity: Int!
}

type OrderPayload {
  status: String!
  message: String!
  data: Order
}

type OrdersPayload {
  status: String!
  message: String!
  data: [Order!]!
}

type Order {
  id: ID!
  user_id: ID!
  status: OrderStatus!
  total_price: Float!
  notes: String
  items: [OrderItem!]!
  created_at: DateTime
  updated_at: DateTime
}

type OrderItem {
  id: ID!
  order_id: ID!
  product_id: ID!
  product_name: String!
  price: Float!
  quantity: Int!
  subtotal: Float!
  created_at: DateTime
  updated_at: DateTime
}

"Directions for ordering a list of records."
enum SortOrder {
  "Sort records in ascending order." ASC
  "Sort records in descending order." DESC
}

"Aggregate functions when ordering by a relation without specifying a column."
enum OrderByRelationAggregateFunction {
  "Amount of items." COUNT
}

"Aggregate functions when ordering by a relation that may specify a column."
enum OrderByRelationWithColumnAggregateFunction {
  "Average." AVG
  "Minimum." MIN
  "Maximum." MAX
  "Sum." SUM
  "Amount of items." COUNT
}

"Allows ordering a list of records."
input OrderByClause {
  "The column that is used for ordering." column: String!
  "The direction that is used for ordering." order: SortOrder!
}

"Specify if you want to include or exclude trashed results from a query."
enum Trashed {
  "Only return trashed results." ONLY
  "Return both trashed and non-trashed results." WITH
  "Only return non-trashed results." WITHOUT
}

"The `Boolean` scalar type represents `true` or `false`."
scalar Boolean

"Directs the executor to include this field or fragment only when the `if` argument is true."
directive @include("Included when true." if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT

"Directs the executor to skip this field or fragment when the `if` argument is true."
directive @skip("Skipped when true." if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT

"Marks an element of a GraphQL schema as no longer supported."
directive @deprecated("Explains why this element was deprecated, usually also including a suggestion for how to access supported similar data. Formatted using the Markdown syntax, as specified by [CommonMark](https://commonmark.org/)." reason: String = "\"No longer supported\"") on FIELD_DEFINITION | ENUM_VALUE | ARGUMENT_DEFINITION | INPUT_FIELD_DEFINITION

"Indicates that an Input Object is a OneOf Input Object (and thus requires exactly one of its fields be provided)."
directive @oneOf on INPUT_OBJECT
